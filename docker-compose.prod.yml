name: cgbot-prod

x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  image: custom-gifts-bot:prod
  init: true
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
  env_file:
    - .env.production
  environment:
    HOST: 0.0.0.0
    PORT: 3000
    TZ: ${TZ:-Europe/Kyiv}
    DATABASE_URL: ${DATABASE_URL:-postgres://custom_gifts:${POSTGRES_PASSWORD:-change_me}@postgres:5432/custom_gifts_bot}
  networks:
    - backend

services:
  postgres:
    image: postgres:16-alpine
    container_name: cgbot-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-custom_gifts_bot}
      POSTGRES_USER: ${POSTGRES_USER:-custom_gifts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - cgbot_prod_postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  receiver:
    <<: *app-base
    container_name: cgbot-prod-receiver
    environment:
      APP_ROLE: receiver
      HOST: 0.0.0.0
      PORT: 3000
      TZ: ${TZ:-Europe/Kyiv}
      DATABASE_URL: ${DATABASE_URL:-postgres://custom_gifts:${POSTGRES_PASSWORD:-change_me}@postgres:5432/custom_gifts_bot}
    networks:
      - backend
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      - "traefik.http.routers.cgbot.rule=Host(`${APP_DOMAIN:-cgbot.workflo.space}`)"
      - "traefik.http.routers.cgbot.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.cgbot.tls.certresolver=${TRAEFIK_CERTRESOLVER:-cf}"
      - "traefik.http.services.cgbot.loadbalancer.server.port=3000"

  migrate:
    <<: *app-base
    container_name: cgbot-prod-migrate
    profiles: ["ops"]
    restart: "no"
    command: ["npm", "run", "migrate"]

  order-worker:
    <<: *app-base
    environment:
      APP_ROLE: order_worker
      TZ: ${TZ:-Europe/Kyiv}
      DATABASE_URL: ${DATABASE_URL:-postgres://custom_gifts:${POSTGRES_PASSWORD:-change_me}@postgres:5432/custom_gifts_bot}
    volumes:
      - cgbot_prod_output_data:/app/storage/files/materials
      - cgbot_prod_temp_data:/app/storage/temp
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4g

  reaction-worker:
    <<: *app-base
    container_name: cgbot-prod-reaction-worker
    environment:
      APP_ROLE: reaction_worker
      TZ: ${TZ:-Europe/Kyiv}
      DATABASE_URL: ${DATABASE_URL:-postgres://custom_gifts:${POSTGRES_PASSWORD:-change_me}@postgres:5432/custom_gifts_bot}

networks:
  backend:
    driver: bridge
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}

volumes:
  cgbot_prod_postgres_data:
  cgbot_prod_output_data:
  cgbot_prod_temp_data:
