name: custom-gifts-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: custom-gifts-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-custom_gifts_bot}
      POSTGRES_USER: ${POSTGRES_USER:-custom_gifts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-custom_gifts}
    ports:
      - "${LOCAL_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - cgu_local_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: custom-gifts-pgadmin-local
    profiles: ["tools"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - cgu_local_pgadmin_data:/var/lib/pgadmin

volumes:
  cgu_local_postgres_data:
  cgu_local_pgadmin_data:
